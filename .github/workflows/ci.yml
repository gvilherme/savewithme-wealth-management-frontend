name: CI

on:
  push:
    branches: ['feature/**']
  pull_request:
    branches: [main]

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  # ─── Job 1: Lint + Test + Build ─────────────────────────────────────────────
  ci:
    name: Lint, Test & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        id: lint
        run: npm run lint 2>&1 | tee /tmp/lint_output.txt
        continue-on-error: true

      - name: Test
        id: test
        run: npm test 2>&1 | tee /tmp/test_output.txt
        continue-on-error: true

      - name: Build
        id: build
        run: npm run build 2>&1 | tee /tmp/build_output.txt
        continue-on-error: true

      - name: Upload CI outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-outputs
          path: |
            /tmp/lint_output.txt
            /tmp/test_output.txt
          retention-days: 1

      - name: Fail if any step failed
        if: |
          steps.lint.outcome == 'failure' ||
          steps.test.outcome == 'failure' ||
          steps.build.outcome == 'failure'
        run: exit 1

  # ─── Job 2: Terraform Plan ───────────────────────────────────────────────────
  tf-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC — read-only role)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.ROLE_ARN_PLAN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.6"

      - name: Terraform Init
        working-directory: terraform
        run: terraform init -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}"

      - name: Terraform Validate
        working-directory: terraform
        run: terraform validate

      - name: Terraform Plan
        id: plan
        working-directory: terraform
        run: |
          set -o pipefail
          terraform plan -no-color -out=tfplan 2>&1 | tee /tmp/plan_output.txt
        continue-on-error: true

      - name: Upload plan output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tf-plan-output
          path: /tmp/plan_output.txt
          retention-days: 1

      - name: Fail if plan failed
        if: steps.plan.outcome == 'failure'
        run: exit 1

  # ─── Job 3: Open PR (feature/* push) ─────────────────────────────────────────
  open-pr:
    name: Open PR to main
    needs: [ci, tf-plan]
    if: |
      always() &&
      github.event_name == 'push' &&
      startsWith(github.ref, 'refs/heads/feature/') &&
      needs.ci.result == 'success'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download CI outputs
        uses: actions/download-artifact@v4
        with:
          name: ci-outputs
          path: /tmp/ci
        continue-on-error: true

      - name: Download plan output
        uses: actions/download-artifact@v4
        with:
          name: tf-plan-output
          path: /tmp/tf
        continue-on-error: true

      - name: Open or update PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${GITHUB_REF#refs/heads/}"

          CI_STATUS="${{ needs.ci.result == 'success' && '✅' || '❌' }}"
          TF_STATUS="${{ needs.tf-plan.result == 'success' && '✅' || needs.tf-plan.result == 'skipped' && '⏭️' || '❌' }}"

          TEST_OUT=$(cat /tmp/ci/tmp/test_output.txt 2>/dev/null | tail -20 || echo "N/A")
          PLAN_OUT=$(cat /tmp/tf/tmp/plan_output.txt 2>/dev/null | head -c 30000 || echo "N/A")

          cat > /tmp/pr_body.md << 'BODY'
          ## CI $CI_STATUS | Terraform Plan $TF_STATUS

          **Lint:** $CI_STATUS | **Tests:** $CI_STATUS | **Build:** $CI_STATUS | **Infra:** $TF_STATUS

          <details><summary>Resultado dos testes</summary>

          ```
          TEST_OUTPUT
          ```

          </details>

          <details><summary>Terraform Plan</summary>

          ```hcl
          PLAN_OUTPUT
          ```

          </details>

          > Commit: `${{ github.sha }}`
          BODY

          sed -i "s|\$CI_STATUS|$CI_STATUS|g" /tmp/pr_body.md
          sed -i "s|\$TF_STATUS|$TF_STATUS|g" /tmp/pr_body.md
          sed -i "s|TEST_OUTPUT|$TEST_OUT|g" /tmp/pr_body.md
          sed -i "s|PLAN_OUTPUT|$PLAN_OUT|g" /tmp/pr_body.md

          EXISTING=$(gh pr list --head "$BRANCH" --base main --json number --jq '.[0].number' 2>/dev/null || true)

          if [ -z "$EXISTING" ]; then
            gh pr create \
              --title "feat: ${BRANCH#feature/}" \
              --base main \
              --head "$BRANCH" \
              --body-file /tmp/pr_body.md

            PR_NUMBER=$(gh pr list --head "$BRANCH" --base main --json number --jq '.[0].number')
            gh pr edit "$PR_NUMBER" --add-reviewer "github-copilot[bot]" 2>/dev/null || true
          else
            gh pr comment "$EXISTING" --body-file /tmp/pr_body.md
          fi

      - name: Comment on PR (pull_request event)
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs')
            const testOut = fs.existsSync('/tmp/ci/tmp/test_output.txt')
              ? fs.readFileSync('/tmp/ci/tmp/test_output.txt', 'utf8').slice(-2000)
              : 'N/A'
            const planOut = fs.existsSync('/tmp/tf/tmp/plan_output.txt')
              ? fs.readFileSync('/tmp/tf/tmp/plan_output.txt', 'utf8').slice(0, 30000)
              : 'N/A'

            const ci = '${{ needs.ci.result }}' === 'success' ? '✅' : '❌'
            const tf = '${{ needs.tf-plan.result }}' === 'success' ? '✅'
                     : '${{ needs.tf-plan.result }}' === 'skipped' ? '⏭️' : '❌'

            const body = `## CI ${ci} | Terraform Plan ${tf}

            <details><summary>Resultado dos testes</summary>

            \`\`\`
            ${testOut}
            \`\`\`

            </details>

            <details><summary>Terraform Plan</summary>

            \`\`\`hcl
            ${planOut}
            \`\`\`

            </details>

            > Commit: \`${{ github.sha }}\``

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            })
