name: CI

on:
  push:
    branches:
      - 'feature/**'
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  ci:
    name: Lint, Test & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        id: lint
        run: npm run lint --no-color 2>&1 | tee /tmp/lint_output.txt
        continue-on-error: true

      - name: Test
        id: test
        run: npm test --no-color 2>&1 | tee /tmp/test_output.txt
        continue-on-error: true

      - name: Build
        id: build
        run: npm run build --no-color 2>&1 | tee /tmp/build_output.txt
        continue-on-error: true

      - name: Open PR to main (feature/* push, CI success)
        if: >
          github.event_name == 'push' &&
          startsWith(github.ref, 'refs/heads/feature/') &&
          steps.lint.outcome == 'success' &&
          steps.test.outcome == 'success' &&
          steps.build.outcome == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${GITHUB_REF#refs/heads/}"
          TEST_OUT=$(cat /tmp/test_output.txt | tail -20)

          printf '## CI ✅\n\n**Lint:** ✅ | **Tests:** ✅ | **Build:** ✅\n\n<details><summary>Ver resultado dos testes</summary>\n\n```\n%s\n```\n\n</details>\n\n> Commit: `%s`\n' \
            "$TEST_OUT" "${{ github.sha }}" > /tmp/pr_body.md

          EXISTING=$(gh pr list --head "$BRANCH" --base main --json number --jq '.[0].number' 2>/dev/null || true)

          if [ -z "$EXISTING" ]; then
            gh pr create \
              --title "feat: ${BRANCH#feature/}" \
              --base main \
              --head "$BRANCH" \
              --body-file /tmp/pr_body.md

            PR_NUMBER=$(gh pr list --head "$BRANCH" --base main --json number --jq '.[0].number')
            gh pr edit "$PR_NUMBER" --add-reviewer "github-copilot[bot]" 2>/dev/null || true
          else
            gh pr comment "$EXISTING" --body-file /tmp/pr_body.md
          fi

      - name: Comment CI results on PR (PR event)
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs')
            const testOut = fs.readFileSync('/tmp/test_output.txt', 'utf8').slice(-3000)

            const s = (step) => step === 'success' ? '✅' : '❌'
            const lint  = '${{ steps.lint.outcome }}'
            const test  = '${{ steps.test.outcome }}'
            const build = '${{ steps.build.outcome }}'
            const allOk = [lint, test, build].every(r => r === 'success')

            const body = `## CI ${allOk ? '✅' : '❌'}

            **Lint:** ${s(lint)} | **Tests:** ${s(test)} | **Build:** ${s(build)}

            <details><summary>Ver resultado dos testes</summary>

            \`\`\`
            ${testOut}
            \`\`\`

            </details>

            > Commit: \`${{ github.sha }}\``

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            })

      - name: Fail if any step failed
        if: >
          steps.lint.outcome == 'failure' ||
          steps.test.outcome == 'failure' ||
          steps.build.outcome == 'failure'
        run: exit 1
