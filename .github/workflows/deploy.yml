name: Deploy

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Terraform Apply + Build + Deploy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ─── AWS credentials (deploy role — write access) ────────────────────────
      - name: Configure AWS credentials (OIDC — deploy role)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.ROLE_ARN_DEPLOY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # ─── Terraform ───────────────────────────────────────────────────────────
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.6"
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: terraform
        run: terraform init -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}"

      - name: Terraform Validate
        working-directory: terraform
        run: terraform validate

      # ─── Mostrar CNAMEs de validação ACM ANTES do apply bloquear ────────────────
      # Na primeira execução, o apply ficará aguardando validação DNS do ACM (até 45 min).
      # Pegamos os CNAMEs logo após o plan para você já saber o que adicionar no GoDaddy.
      - name: Terraform Plan (captura CNAMEs de validação ACM)
        id: plan
        working-directory: terraform
        run: terraform plan -no-color -out=tfplan
        continue-on-error: true

      - name: Extrair CNAMEs de validação ACM (se certificado for criado)
        working-directory: terraform
        run: |
          echo "========================================================"
          echo " AÇÃO NECESSÁRIA — DNS no GoDaddy"
          echo "========================================================"
          echo ""
          echo "Se esta é a primeira vez que o certificado ACM é criado,"
          echo "o apply abaixo ficará aguardando até você adicionar estes"
          echo "registros DNS no GoDaddy (DNS Management do lorixlabs.com):"
          echo ""
          echo "  1. CNAME de VALIDAÇÃO do certificado SSL:"
          echo "     (valores aparecerão nos outputs do apply logo abaixo)"
          echo "     output: acm_validation_cname_name  → Nome"
          echo "     output: acm_validation_cname_value → Valor"
          echo ""
          echo "  2. CNAME do DOMÍNIO (após o apply concluir):"
          echo "     Nome:  savewithme"
          echo "     Valor: output cloudfront_domain_name"
          echo ""
          echo "========================================================"

      - name: Terraform Apply
        working-directory: terraform
        run: terraform apply -auto-approve -input=false

      # ─── Read Terraform outputs ──────────────────────────────────────────────
      - name: Read Terraform outputs
        id: tf
        working-directory: terraform
        run: |
          echo "bucket=$(terraform output -raw s3_bucket)" >> "$GITHUB_OUTPUT"
          echo "distribution=$(terraform output -raw cloudfront_distribution_id)" >> "$GITHUB_OUTPUT"

      - name: Resumo do deploy
        working-directory: terraform
        run: |
          echo "========================================================"
          echo " DEPLOY CONCLUÍDO"
          echo "========================================================"
          echo " Frontend URL : $(terraform output -raw frontend_url)"
          echo " CloudFront   : $(terraform output -raw cloudfront_url)"
          echo ""
          echo " Se ainda não adicionou os CNAMEs no GoDaddy:"
          echo "   Validação ACM:"
          echo "     Nome  : $(terraform output -raw acm_validation_cname_name)"
          echo "     Valor : $(terraform output -raw acm_validation_cname_value)"
          echo "   Domínio (subdomínio savewithme):"
          echo "     Nome  : savewithme"
          echo "     Valor : $(terraform output -raw cloudfront_domain_name)"
          echo "========================================================"

      # ─── Build frontend ──────────────────────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      # ─── Deploy to S3 ────────────────────────────────────────────────────────
      - name: Sync dist to S3
        run: |
          # index.html — no cache (always fetch latest)
          aws s3 cp dist/index.html s3://${{ steps.tf.outputs.bucket }}/index.html \
            --cache-control "no-cache, no-store, must-revalidate"

          # All other assets — long cache (content-hashed filenames)
          aws s3 sync dist/ s3://${{ steps.tf.outputs.bucket }}/ \
            --exclude "index.html" \
            --cache-control "public, max-age=31536000, immutable" \
            --delete

      # ─── Invalidate CloudFront ───────────────────────────────────────────────
      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ steps.tf.outputs.distribution }} \
            --paths "/*"
